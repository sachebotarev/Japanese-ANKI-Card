# Сборка Quartz и публикация на GitHub Pages (project site).
# Используется ванильный Quartz из апстрима + наш оверлей в quartz_overlay/.
# Контент: scripts/sync_quartz_content.py → quartz_content/ (Записи + raw URL для медиа).

name: Quartz GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "Записи/**"
      - "quartz_overlay/**"
      - "scripts/sync_quartz_content.py"
      - "scripts/build_quartz.sh"
      - ".github/workflows/quartz-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-quartz
  cancel-in-progress: false

env:
  QUARTZ_VERSION: v4.5.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Клонировать ванильный Quartz
        run: git clone --depth 1 --branch "${QUARTZ_VERSION}" https://github.com/jackyzha0/quartz.git .quartz-build

      - name: Накатить оверлей
        run: cp -R quartz_overlay/. .quartz-build/

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: .quartz-build/package-lock.json

      - name: Подготовить content (Записи + raw-ссылки)
        env:
          QUARTZ_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}
        run: python3 scripts/sync_quartz_content.py

      - name: Установить зависимости Quartz
        working-directory: .quartz-build
        run: npm ci

      - name: Сборка Quartz
        working-directory: .quartz-build
        run: npx quartz build -d ../quartz_content -o ../quartz_site --verbose

      - name: Загрузить артефакт Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: quartz_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Опубликовать на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
